<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/png" href="/assets/LogoThething.png" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>THE THING STUDIO</title>
  </head>
  <body>
    <!-- Cthulhu Watcher Header -->
    <header id="cthulhu-header">
      <div id="watcher-canvas-container"></div>
    </header>

    <div class="noise-overlay"></div>

    <div id="app-content">
      <!-- Background Shift Elements -->
      <div class="background-shift">
        <div class="blob blob-1"></div>
        <div class="blob blob-2"></div>
      </div>

      <!-- Custom Tentacle Scrollbar -->
      <div class="tentacle-scrollbar-container">
        <svg class="tentacle-svg" viewBox="0 0 50 1000" preserveAspectRatio="none">
          <path class="tentacle-path" d="M25,0 C40,200 10,400 25,600 C40,800 10,950 25,1000" />
        </svg>
      </div>

      <!-- Main Content -->
      <main>
        <!-- Hero Section -->
        <section class="hero">
          <h1 class="hero-title">THE THING STUDIO</h1>
        </section>

        <!-- Games Section -->
        <section class="games" id="games-section">
          <div class="game-card bitcrash-card">
            <h2 class="rgb-text">BitCrash</h2>
            <p>Trò chơi duy nhất tồn tại ở đây. Khám phá sự hỗn loạn trong từng pixel.</p>
            <button class="game-btn" data-target="https://play.google.com/store/apps/details?id=com.TheThing_Studio.BitCrash">Tải trên Google Play</button>
          </div>
        </section>
        <!-- Footer / Abyss Section -->
        <section class="abyss-footer">
          <div class="abyss-divider"></div>
          <p class="abyss-subtext">© 2025 The Thing Studio. All things reserved.</p>
          <!-- More spacing for longer page -->
          <div style="height: 100vh;"></div>
        </section>
      </main>
    </div>

    <!-- Tentacle Strike Overlay for Click Intercept -->
    <div class="strike-overlay">
      <svg class="strike-tentacle" viewBox="0 0 100 1000" preserveAspectRatio="none">
        <!-- Organic, undulating tentacle shape -->
        <path d="M10,1000 C 50,800 -20,600 40,400 C 80,200 45,50 50,0 C 55,50 100,200 60,400 C 20,600 80,800 50,1000 Z" />
      </svg>
    </div>

    <script type="module" src="/main.js"></script>
  </body>
</html>
